<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Dashboard</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --accent-color: var(--tg-theme-accent-text-color, #007aff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --button-color: var(--tg-theme-button-color, #007aff);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--hint-color);
        }
        header h1 {
            font-size: 22px;
            color: var(--accent-color);
        }
        header #user-greeting {
            font-size: 14px;
            color: var(--hint-color);
        }
        .card {
            background: var(--secondary-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--accent-color);
        }
        .price-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 8px;
            font-size: 28px;
            font-weight: bold;
            color: var(--text-color);
        }
        .price-display .currency {
            font-size: 16px;
            font-weight: normal;
            color: var(--hint-color);
        }
        .last-update {
            text-align: center;
            font-size: 12px;
            color: var(--hint-color);
            margin-top: 4px;
        }
        .btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .btn:active {
            opacity: 0.7;
        }
        .converter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .converter-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--hint-color);
            border-radius: 10px;
            font-size: 16px;
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
        }
        .converter-row input:focus {
            border-color: var(--accent-color);
        }
        .converter-row .arrow {
            font-size: 20px;
            color: var(--hint-color);
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--hint-color);
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: var(--hint-color);
        }
        .stat-value {
            font-weight: 600;
            color: var(--text-color);
        }
        .badge {
            background: var(--accent-color);
            color: var(--button-text);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: var(--hint-color);
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 10px;
            color: var(--hint-color);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <header>
            <h1>📊 Pi Dashboard</h1>
            <span id="user-greeting">مرحباً!</span>
        </header>

        <!-- بطاقة السعر -->
        <section class="card">
            <h2>💰 سعر Pi Coin</h2>
            <div class="price-display">
                <span id="pi-price">...جاري التحميل</span>
                <span class="currency">USD</span>
            </div>
            <div class="last-update">آخر تحديث: <span id="last-update">-</span></div>
            <button id="refresh-price" class="btn">🔄 تحديث السعر</button>
        </section>

        <!-- محول العملات -->
        <section class="card">
            <h2>🔄 محول العملات</h2>
            <div class="converter-row">
                <input type="number" id="pi-input" placeholder="Pi" value="1">
                <span class="arrow">➡️</span>
                <input type="number" id="usd-input" placeholder="USD" readonly>
            </div>
            <button id="convert-btn" class="btn">تحويل</button>
        </section>

        <!-- إحصائيات المجموعة -->
        <section class="card">
            <h2>📈 إحصائيات المجموعة</h2>
            <div class="stat-item">
                <span class="stat-label">👤 الأعضاء</span>
                <span class="stat-value" id="members-count">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚠️ المخالفات</span>
                <span class="stat-value" id="violations-count">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🚫 المحظورين</span>
                <span class="stat-value" id="bans-count">-</span>
            </div>
            <button id="refresh-stats" class="btn">🔄 تحديث الإحصائيات</button>
        </section>

        <footer>
            🛡️ Raskov Security Bot &copy; 2026
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
