<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi Dashboard</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- ========================================================= -->
    <!-- كود تثبيت Monetag (تم نسخه من لوحة التحكم) -->
    <!-- ========================================================= -->
    <script src='https://libtl.com/sdk.js' data-zone='11183003' data-sdk='show_11183003'></script>
    <!-- ========================================================= -->
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Pi Dashboard</h1>
            <p id="user-greeting">مرحباً بك!</p>
        </header>

        <section class="card price-card">
            <h2>💰 سعر Pi Coin</h2>
            <div class="price-display">
                <span id="pi-price">...جاري التحميل</span>
                <span class="currency">USD</span>
            </div>
            <small>آخر تحديث: <span id="last-update">-</span></small>
            <button id="refresh-btn" class="btn">🔄 تحديث</button>
        </section>

        <section class="card converter">
            <h2>🔄 محول العملات</h2>
            <div class="converter-row">
                <input type="number" id="pi-input" placeholder="أدخل قيمة Pi" value="1">
                <span class="arrow">➡️</span>
                <input type="number" id="usd-input" placeholder="القيمة بالدولار" readonly>
            </div>
            <button id="convert-btn" class="btn">تحويل</button>
        </section>

        <section class="card stats-card">
            <h2>📈 إحصائيات المجموعة</h2>
            <div class="stat-item">
                <span class="stat-label">👤 الأعضاء</span>
                <span class="stat-value" id="members-count">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚠️ المخالفات</span>
                <span class="stat-value" id="violations-count">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🚫 المحظورين</span>
                <span class="stat-value" id="bans-count">-</span>
            </div>
        </section>

        <footer>
            <p>🛡️ Raskov Security Bot &copy; 2026</p>
        </footer>
    </div>

    <!-- ========================================= -->
    <!--  تفعيل الإعلانات البينية (In-App Interstitial) -->
    <!-- ========================================= -->
    <script>
        // انتظر تحميل SDK ثم فعّل الإعلانات
        function activateMonetagAds() {
            // الدالة show_11183003 تم تعريفها بواسطة الكود الذي وضعناه في <head>
            if (typeof show_11183003 === 'function') {
                show_11183003({
                    type: 'inApp',
                    inAppSettings: {
                        frequency: 2,          // عدد مرات الظهور
                        capping: 0.1,          // 0.1 ساعة = 6 دقائق
                        interval: 30,          // 30 ثانية بين كل إعلان والآخر
                        timeout: 5,            // 5 ثوانٍ تأخير قبل أول إعلان
                        everyPage: false       // لا تعيد ضبط العداد عند التنقل بين الصفحات
                    }
                });
                console.log('✅ تم تفعيل إعلانات Monetag (In-App Interstitial)');
            } else {
                console.warn('⚠️ Monetag SDK لم يتم تحميله بعد. حاول مجدداً.');
                // إعادة المحاولة بعد ثانية
                setTimeout(activateMonetagAds, 1000);
            }
        }

        // تشغيل التفعيل عند تحميل الصفحة
        window.addEventListener('load', activateMonetagAds);
    </script>

    <script src="script.js"></script>
</body>
</html>
